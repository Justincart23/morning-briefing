name: Morning Briefing

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 6:30 AM ET (10:30 UTC) weekdays
    - cron: '30 11 * * 6,0'  # 6:30 AM ET (11:30 UTC) weekends (DST adjust)
  workflow_dispatch:  # allows manual trigger

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run morning briefing
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: justincartagenova@gmail.com
        run: python morning_briefing.py
